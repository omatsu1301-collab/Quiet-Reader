name: quiet_reader
description: PCで書いた文章をスマホで静かに読み返すための個人用読書アプリ
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # ローカルストレージ
  hive: 2.2.3
  hive_flutter: 1.1.0
  shared_preferences: 2.5.3
  # 状態管理
  provider: 6.1.5+1
  # UUID生成
  uuid: 4.5.1
  # 日付フォーマット
  intl: 0.19.0
  # クリップボード（Flutter標準）
  # その他UI補助
  google_fonts: 6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 5.0.0
  hive_generator: 2.0.1
  build_runner: 2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
